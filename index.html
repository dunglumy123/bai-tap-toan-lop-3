<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Toán Lớp 3</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#f093fb,#f5576c,#4facfe);min-height:100vh;padding:16px}
        .container{max-width:800px;margin:0 auto}
        header{text-align:center;color:#fff;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
        header h1{font-size:2em}
        .card{background:#fff;border-radius:18px;padding:24px;margin-bottom:16px;box-shadow:0 6px 25px rgba(0,0,0,.15)}
        .card h2{color:#e91e63;margin-bottom:16px;font-size:1.3em;text-align:center}
        .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:400px;margin:0 auto}
        .menu-btn{padding:24px 12px;border:3px solid #e91e63;border-radius:14px;background:#fff;cursor:pointer;font-size:1.1em;font-weight:600;color:#333;transition:all .2s;text-align:center}
        .menu-btn:hover{background:#e91e63;color:#fff;transform:translateY(-2px)}
        .menu-btn .icon{font-size:2.5em;display:block;margin-bottom:8px}
        .menu-btn .desc{font-size:.75em;color:#888;font-weight:400;margin-top:6px}
        .menu-btn:hover .desc{color:#ffcdd2}
        .exercise-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
        .exercise-header h2{margin-bottom:0;text-align:left}
        .score-box{background:#fff3e0;border-radius:10px;padding:8px 14px;font-weight:600;color:#e65100;font-size:.95em;display:flex;gap:12px;align-items:center}
        .timer{color:#1565c0;font-family:'Courier New',monospace}
        .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0}
        .btn{padding:12px 24px;border:none;border-radius:12px;font-size:1em;font-weight:600;cursor:pointer;transition:all .2s}
        .btn:hover{transform:translateY(-2px)}
        .btn-primary{background:#e91e63;color:#fff}
        .btn-green{background:#4caf50;color:#fff}
        .btn-blue{background:#2196f3;color:#fff}
        .btn-orange{background:#ff9800;color:#fff}
        .btn-back{background:#9e9e9e;color:#fff}
        .hidden{display:none!important}

        .div-board{background:#fffde7;border:3px solid #ffd54f;border-radius:16px;padding:24px;margin-bottom:12px;display:flex;justify-content:center;overflow-x:auto}
        .div-frame{display:inline-flex;align-items:stretch;font-family:'Courier New',monospace;font-size:1.7em;font-weight:700;line-height:2.2}
        .div-left{text-align:left;padding-right:2px}
        .div-right{border-left:3px solid #333;padding-left:12px}
        .div-divisor{border-bottom:3px solid #333;padding-bottom:2px}
        .div-quotient{padding-top:4px;letter-spacing:2px}
        .work-row{white-space:pre;min-height:1em}
        .mult-inner{font-family:'Courier New',monospace;font-size:1.7em;font-weight:700;line-height:2;display:inline-block;text-align:right}
        .mult-inner .m-line{border-top:3px solid #333;margin:4px 0;padding-top:4px}

        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
        input[type=number]{-moz-appearance:textfield}

        .q-done{color:#e91e63}
        .q-blank{color:#ccc}
        .q-inp,.w-inp{font-family:'Courier New',monospace;font-weight:700;font-size:1em;border:2px dashed #e91e63;border-radius:4px;background:#fff9c4;text-align:center;padding:0;height:1.3em}
        .q-inp{width:1.1em}
        .q-inp:focus,.w-inp:focus{outline:none;border-style:solid;background:#fff}
        .q-free,.w-free{font-family:'Courier New',monospace;font-weight:700;font-size:1em;border:none;border-bottom:2px solid #999;border-radius:0;background:transparent;text-align:center;padding:0;height:1.3em}
        .q-free{width:1.1em}
        .w-free{text-align:right}
        .q-free:focus,.w-free:focus{outline:none;border-bottom-color:#e91e63;background:#fff9c4}
        .q-free.ok,.w-free.ok{border-bottom-color:#4caf50;background:#e8f5e9;color:#2e7d32}
        .q-free.err,.w-free.err{border-bottom-color:#f44336;background:#ffebee;color:#c62828}

        .c-blue{color:#1565c0}
        .c-pink{color:#e91e63}
        .input-wrong{animation:shake .3s;border-color:red!important;background:#ffebee!important}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

        .div-instruction{text-align:center;font-size:1.05em;color:#555;margin-bottom:14px;min-height:1.5em}
        .div-instruction strong{color:#e91e63}
        .div-done-msg{text-align:center;font-size:1.3em;font-weight:700;color:#2e7d32;background:#e8f5e9;padding:16px;border-radius:12px;margin:12px 0}
        .div-mode-label{text-align:center;font-size:.9em;color:#888;margin-bottom:10px;font-style:italic}

        .game-over{text-align:center;padding:24px;border-radius:16px;margin:12px 0}
        .game-over .go-title{font-size:1.4em;font-weight:700;margin-bottom:16px}
        .game-over .go-stats{display:inline-block;background:rgba(255,255,255,.7);border-radius:12px;padding:16px 24px;margin:8px 0;font-size:1.1em;line-height:2}
        .game-over .go-stats b{font-size:1.2em}
        .game-over .go-answer{font-size:.95em;margin-top:12px;color:#555}

        .frac-rect{display:flex;justify-content:center;margin:16px 0}
        .frac-cells{display:flex;border:3px solid #333;border-radius:4px;overflow:hidden}
        .frac-cell{width:52px;height:60px;border-right:2px solid #333;background:#fff}
        .frac-cell:last-child{border-right:none}
        .frac-cell.colored{background:#42a5f5}
        .frac-question{text-align:center;font-size:1.2em;margin:16px 0}
        .frac-inp-wrap{display:inline-flex;flex-direction:column;align-items:center;margin:0 4px}
        .frac-inp{width:2.5em;text-align:center;font-size:1.3em;font-weight:700;border:2px solid #e91e63;border-radius:6px;padding:4px;background:#fff9c4}
        .frac-inp:focus{outline:none;border-color:#1565c0;background:#fff}
        .frac-line{width:2.5em;height:3px;background:#333;margin:2px 0}

        @media(max-width:500px){.menu-grid{grid-template-columns:1fr}.div-frame{font-size:1.3em}.mult-inner{font-size:1.3em}header h1{font-size:1.5em}.score-box{font-size:.8em;gap:8px}.frac-cell{width:40px;height:48px}}
    </style>
</head>
<body>
<div class="container">
    <header><h1>Bài Tập Toán Lớp 3</h1></header>

    <div id="menuPage" class="card">
        <h2>Chọn bài tập</h2>
        <div class="menu-grid" style="grid-template-columns:1fr 1fr 1fr">
            <button class="menu-btn" onclick="startEx('mult')"><span class="icon">&#10006;</span>Phép nhân</button>
            <button class="menu-btn" onclick="startEx('div')"><span class="icon">&#247;</span>Phép chia</button>
            <button class="menu-btn" onclick="startEx('frac')"><span class="icon">&#189;</span>Phân số</button>
        </div>
    </div>

    <div id="multPage" class="card hidden">
        <div class="exercise-header">
            <h2 id="mT">Phép nhân</h2>
            <div class="score-box"><span>Đúng: <span id="mOk">0</span>/<span id="mAll">0</span></span><span class="timer" id="mTime">00:00</span></div>
        </div>
        <div class="div-mode-label" id="mMode"></div>
        <div class="div-instruction" id="mInst"></div>
        <div class="div-board" id="mBoard"></div>
        <div id="mDone" class="hidden"></div>
        <div class="btn-row">
            <button class="btn btn-green hidden" id="mChk" onclick="chkMF()">Kiểm tra</button>
            <button class="btn btn-blue hidden" id="mSolBtn" onclick="showMSol()">Xem đáp án</button>
            <button class="btn btn-primary hidden" id="mNxt" onclick="nxtM()">Bài tiếp</button>
            <button class="btn btn-orange hidden" id="mReplay" onclick="startEx('mult')">Chơi lại</button>
        </div>
        <div class="btn-row"><button class="btn btn-back" onclick="goMenu()">Quay lại</button></div>
    </div>

    <div id="divPage" class="card hidden">
        <div class="exercise-header">
            <h2 id="dT">Phép chia</h2>
            <div class="score-box"><span>Đúng: <span id="dOk">0</span>/<span id="dAll">0</span></span><span class="timer" id="dTime">00:00</span></div>
        </div>
        <div class="div-mode-label" id="dMode"></div>
        <div class="div-instruction" id="dInst"></div>
        <div class="div-board" id="dBoard"></div>
        <div id="dDone" class="hidden"></div>
        <div class="btn-row">
            <button class="btn btn-green hidden" id="dChk" onclick="chkDFree()">Kiểm tra</button>
            <button class="btn btn-blue hidden" id="dSolBtn" onclick="showDSol()">Xem đáp án</button>
            <button class="btn btn-primary hidden" id="dNxt" onclick="nxtD()">Bài tiếp</button>
            <button class="btn btn-orange hidden" id="dReplay" onclick="startEx('div')">Chơi lại</button>
        </div>
        <div class="btn-row"><button class="btn btn-back" onclick="goMenu()">Quay lại</button></div>
    </div>

    <div id="fracPage" class="card hidden">
        <div class="exercise-header">
            <h2 id="fT">Phân số</h2>
            <div class="score-box"><span>Đúng: <span id="fOk">0</span>/<span id="fAll">0</span></span><span class="timer" id="fTime">00:00</span></div>
        </div>
        <div class="div-instruction" id="fInst"></div>
        <div id="fBoard"></div>
        <div id="fDone" class="hidden"></div>
        <div class="btn-row">
            <button class="btn btn-green hidden" id="fChk" onclick="chkFrac()">Kiểm tra</button>
            <button class="btn btn-primary hidden" id="fNxt" onclick="nxtF()">Bài tiếp</button>
            <button class="btn btn-orange hidden" id="fReplay" onclick="startEx('frac')">Chơi lại</button>
        </div>
        <div class="btn-row"><button class="btn btn-back" onclick="goMenu()">Quay lại</button></div>
    </div>
</div>

<script>
let cType,cA,cB;
const $=id=>document.getElementById(id);
const S='\u00A0';
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pad(s,n){return s.padStart(n,S)}

// ========== TIMER ==========
let tmInterval=null,tmStart=0;
function startTimer(){
    tmStart=Date.now();
    if(tmInterval)clearInterval(tmInterval);
    tmInterval=setInterval(updTimer,1000);
    updTimer();
}
function stopTimer(){if(tmInterval){clearInterval(tmInterval);tmInterval=null}}
function updTimer(){
    const el=cType==='mult'?$('mTime'):cType==='div'?$('dTime'):$('fTime');
    if(el)el.textContent=fmtTime();
}
function fmtTime(){
    const s=Math.floor((Date.now()-tmStart)/1000);
    const m=Math.floor(s/60),ss=s%60;
    return (m<10?'0'+m:m)+':'+(ss<10?'0'+ss:ss);
}

function goMenu(){stopTimer();$('menuPage').classList.remove('hidden');$('multPage').classList.add('hidden');$('divPage').classList.add('hidden');$('fracPage').classList.add('hidden')}

function startEx(t){
    cType=t;
    $('menuPage').classList.add('hidden');
    if(t==='mult'){
        mOk=0;mAl=0;mFirst=true;mGameOver=false;
        $('mT').textContent='Phép nhân';$('multPage').classList.remove('hidden');
        $('mReplay').classList.add('hidden');
        startTimer();nxtM();
    }else if(t==='div'){
        dOk=0;dAl=0;dFirst=true;dGameOver=false;
        $('dT').textContent='Phép chia';$('divPage').classList.remove('hidden');
        $('dReplay').classList.add('hidden');
        startTimer();nxtD();
    }else{
        fOk=0;fAl=0;fGameOver=false;
        $('fracPage').classList.remove('hidden');
        $('fReplay').classList.add('hidden');
        startTimer();nxtF();
    }
}

// ============ MULTIPLICATION ============
let mOk=0,mAl=0,mFirst=true,mNoErr=true,mChecked=false,mGameOver=false;
let mResult,mDigits,mSI,mType;
let mPP1,mPP2,mPhase;
let mFD=[],mFI=0;

function compMDigits(a,b){
    const digs=(a+'').split('').map(Number).reverse();
    let carry=0,steps=[];
    for(let i=0;i<digs.length;i++){
        const p=digs[i]*b+carry;
        steps.push({d:digs[i],prevCarry:carry,write:p%10,newCarry:Math.floor(p/10)});
        carry=Math.floor(p/10);
    }
    if(carry>0) steps.push({d:null,prevCarry:carry,write:carry,newCarry:0});
    return steps;
}

function nxtM(){
    if(mGameOver)return;
    if(Math.random()<0.5){cA=ri(100,9999);cB=ri(2,9)}
    else{cA=ri(1000,99999);cB=Math.random()<0.6?ri(2,9):ri(11,99)}
    mResult=cA*cB;mType=(cB+'').length;

    $('mDone').classList.add('hidden');$('mDone').className='hidden';
    $('mNxt').classList.add('hidden');$('mSolBtn').classList.add('hidden');
    $('mChk').classList.add('hidden');$('mReplay').classList.add('hidden');
    $('mBoard').classList.remove('hidden');
    $('mOk').textContent=mOk;$('mAll').textContent=mAl;

    if(mFirst){
        $('mMode').textContent='Bài mẫu - làm theo hướng dẫn';
        mNoErr=true;
        if(mType===1){mDigits=compMDigits(cA,cB);mSI=0;renMG1()}
        else{const bS=cB+'';mPP1=cA*(+bS[1]);mPP2=cA*(+bS[0]);mPhase='pp1';renMG2()}
    }else{
        $('mMode').textContent='Tự trình bày phép nhân';
        mChecked=false;
        if(mType===1){mFD=[];mFI=0;$('mInst').innerHTML='';renMF1()}
        else{$('mInst').innerHTML='Điền vào các ô trống, xong bấm <b>Kiểm tra</b>';$('mChk').classList.remove('hidden');renMF2()}
    }
}

function mHead(mx,aStr,bStr){
    let h='<div class="mult-inner"><div>'+pad(aStr,mx)+'</div>';
    h+='<div>&times;'+pad(bStr,mx-1)+'</div>';return h;
}

// ===== 1-DIGIT GUIDED =====
function renMG1(){
    const aStr=cA+'',bStr=cB+'',rStr=mResult+'';
    const mx=Math.max(aStr.length,bStr.length+1,rStr.length);
    const done=mSI>=mDigits.length;
    let h=mHead(mx,aStr,bStr)+'<div class="m-line">'+S.repeat(mx-rStr.length);
    for(let i=0;i<rStr.length;i++){
        const pfr=rStr.length-1-i;
        if(pfr<mSI||done) h+='<span class="q-done">'+rStr[i]+'</span>';
        else if(pfr===mSI) h+='<input type="number" id="ai" class="q-inp">';
        else h+='<span class="q-blank">_</span>';
    }
    h+='</div></div>';$('mBoard').innerHTML=h;
    let inst='';
    if(!done){const st=mDigits[mSI];
        if(st.d!==null){inst=cB+' &times; '+st.d;if(st.prevCarry>0)inst+=' + '+st.prevCarry+'(nhớ)';inst+=' = ?, viết <strong>mấy</strong>?'}
        else inst='Còn nhớ <strong>mấy</strong>? Viết số nhớ';
    }
    $('mInst').innerHTML=inst;
    setTimeout(()=>{const inp=$('ai');if(inp)inp.focus()},50);
}

function chkMG1(){
    const inp=$('ai');if(!inp)return;
    const v=parseInt(inp.value);if(isNaN(v)||v<0){inp.focus();return}
    if(v===mDigits[mSI].write){mSI++;if(mSI>=mDigits.length)finMG();renMG1()}
    else{mNoErr=false;inp.classList.add('input-wrong');setTimeout(()=>{inp.classList.remove('input-wrong');inp.value='';inp.focus()},400)}
}

// ===== 1-DIGIT FREE-FORM =====
function renMF1(){
    const aStr=cA+'',bStr=cB+'',rStr=mResult+'';
    const mx=Math.max(aStr.length,bStr.length+1,rStr.length);
    const allFilled=mFI>=rStr.length;
    let h=mHead(mx,aStr,bStr)+'<div class="m-line">'+S.repeat(mx-rStr.length);
    for(let i=0;i<rStr.length;i++){
        const pfr=rStr.length-1-i;
        if(pfr<mFI) h+='<span>'+mFD[pfr]+'</span>';
        else if(pfr===mFI&&!allFilled) h+='<input type="number" id="ai" class="q-free" oninput="advMF()">';
        else h+='<span class="q-blank">_</span>';
    }
    h+='</div></div>';$('mBoard').innerHTML=h;
    if(allFilled&&!mChecked)$('mChk').classList.remove('hidden');
    setTimeout(()=>{const inp=$('ai');if(inp)inp.focus()},50);
}
function advMF(){
    const inp=$('ai');if(!inp||inp.value==='')return;
    const d=parseInt(inp.value.slice(-1));if(isNaN(d)){inp.value='';return}
    mFD[mFI]=d;mFI++;renMF1();
}

// ===== 2-DIGIT GUIDED =====
function renMG2(){
    const aStr=cA+'',bStr=cB+'',b1=+bStr[1],b0=+bStr[0];
    const pp1S=mPP1+'',pp2S=mPP2+'',rStr=mResult+'';
    const mx=Math.max(aStr.length,bStr.length+1,pp1S.length,pp2S.length+1,rStr.length);
    const done=mPhase==='done';
    let h=mHead(mx,aStr,bStr)+'<div class="m-line">';
    if(mPhase==='pp1') h+=S.repeat(mx-pp1S.length)+'<input type="number" id="ai" class="w-inp" style="width:'+Math.max(pp1S.length+1,3)+'ch">';
    else h+='<span class="c-blue">'+pad(pp1S,mx)+'</span>';
    h+='</div><div>';
    if(mPhase==='pp2') h+=S.repeat(mx-1-pp2S.length)+'<input type="number" id="ai" class="w-inp" style="width:'+Math.max(pp2S.length+1,3)+'ch">'+S;
    else if(mPhase==='pp1') h+=pad(S.repeat(pp2S.length),mx-1)+S;
    else h+='<span class="c-blue">'+pad(pp2S,mx-1)+'</span>'+S;
    h+='</div><div class="m-line">';
    if(mPhase==='sum') h+=S.repeat(mx-rStr.length)+'<input type="number" id="ai" class="w-inp" style="width:'+Math.max(rStr.length+1,3)+'ch">';
    else if(done) h+='<span class="q-done">'+pad(rStr,mx)+'</span>';
    else h+=pad(S.repeat(rStr.length),mx);
    h+='</div></div>';$('mBoard').innerHTML=h;
    let inst='';
    if(mPhase==='pp1') inst=aStr+' &times; '+b1+' = <strong>?</strong>';
    else if(mPhase==='pp2') inst=aStr+' &times; '+b0+' = <strong>?</strong>';
    else if(mPhase==='sum') inst=pp1S+' + '+mPP2+'0 = <strong>?</strong>';
    $('mInst').innerHTML=inst;
    setTimeout(()=>{const inp=$('ai');if(inp)inp.focus()},50);
}
function chkMG2(){
    const inp=$('ai');if(!inp)return;
    const v=parseInt(inp.value);if(isNaN(v)){inp.focus();return}
    let exp=mPhase==='pp1'?mPP1:mPhase==='pp2'?mPP2:mResult;
    if(v===exp){
        if(mPhase==='pp1')mPhase='pp2';else if(mPhase==='pp2')mPhase='sum';else{mPhase='done';finMG()}
        renMG2();
    }else{mNoErr=false;inp.classList.add('input-wrong');setTimeout(()=>{inp.classList.remove('input-wrong');inp.value='';inp.focus()},400)}
}

// ===== 2-DIGIT FREE-FORM =====
function renMF2(){
    const aStr=cA+'',bStr=cB+'',b1=+bStr[1],b0=+bStr[0];
    mPP1=cA*b1;mPP2=cA*b0;
    const pp1S=mPP1+'',pp2S=mPP2+'',rStr=mResult+'';
    const mx=Math.max(aStr.length,bStr.length+1,pp1S.length,pp2S.length+1,rStr.length);
    let h=mHead(mx,aStr,bStr)+'<div class="m-line">';
    h+=S.repeat(mx-pp1S.length)+'<input type="number" class="w-free" id="fpp1" style="width:'+Math.max(pp1S.length+1,3)+'ch">';
    h+='</div><div>';
    h+=S.repeat(mx-1-pp2S.length)+'<input type="number" class="w-free" id="fpp2" style="width:'+Math.max(pp2S.length+1,3)+'ch">'+S;
    h+='</div><div class="m-line">';
    h+=S.repeat(mx-rStr.length)+'<input type="number" class="w-free" id="fsum" style="width:'+Math.max(rStr.length+1,3)+'ch">';
    h+='</div></div>';$('mBoard').innerHTML=h;
    setTimeout(()=>{const f=$('fpp1');if(f)f.focus()},50);
}

// ===== MULT DISPATCHERS =====
function chkMG(){if(mType===1)chkMG1();else chkMG2()}

function finMG(){
    mAl++;if(mNoErr)mOk++;
    let m='<div class="div-done-msg">';
    m+=mNoErr?'Giỏi lắm! &#127881;<br>':'Hoàn thành! &#128170;<br>';
    m+='<span style="font-size:.8em">'+cA+' &times; '+cB+' = <b>'+mResult+'</b></span>';
    m+='<br><span style="font-size:.75em;color:#1565c0">Các bài sau con tự làm nhé!</span></div>';
    $('mDone').innerHTML=m;$('mDone').classList.remove('hidden');
    $('mNxt').classList.remove('hidden');$('mInst').innerHTML='';
    $('mOk').textContent=mOk;$('mAll').textContent=mAl;
    mFirst=false;
    if(mType===1)renMG1();else renMG2();
}

// ===== MULT FREE-FORM CHECK =====
function chkMF(){
    if(mChecked)return;mChecked=true;
    let allOk=true;
    if(mType===1){
        const rStr=mResult+'',aStr=cA+'',bStr=cB+'';
        const mx=Math.max(aStr.length,bStr.length+1,rStr.length);
        let h=mHead(mx,aStr,bStr)+'<div class="m-line">'+S.repeat(mx-rStr.length);
        for(let i=0;i<rStr.length;i++){
            const pfr=rStr.length-1-i,entered=mFD[pfr],correct=parseInt(rStr[i]);
            if(entered===correct) h+='<span style="color:#2e7d32;background:#e8f5e9;padding:0 1px;border-radius:3px">'+entered+'</span>';
            else{h+='<span style="color:#c62828;background:#ffebee;padding:0 1px;border-radius:3px;text-decoration:line-through">'+entered+'</span>';allOk=false}
        }
        h+='</div></div>';$('mBoard').innerHTML=h;
    }else{
        const p1=$('fpp1'),p2=$('fpp2'),sm=$('fsum');
        if(parseInt(p1.value)===mPP1){p1.classList.add('ok')}else{p1.classList.add('err');allOk=false}
        if(parseInt(p2.value)===mPP2){p2.classList.add('ok')}else{p2.classList.add('err');allOk=false}
        if(parseInt(sm.value)===mResult){sm.classList.add('ok')}else{sm.classList.add('err');allOk=false}
        p1.readOnly=p2.readOnly=sm.readOnly=true;
    }
    mAl++;if(allOk)mOk++;
    $('mChk').classList.add('hidden');$('mInst').innerHTML='';
    $('mOk').textContent=mOk;$('mAll').textContent=mAl;

    if(allOk){
        $('mDone').innerHTML='<div class="div-done-msg">Đúng rồi! &#127881; '+cA+' &times; '+cB+' = <b>'+mResult+'</b></div>';
        $('mDone').classList.remove('hidden');
        $('mNxt').classList.remove('hidden');
    }else{
        // GAME OVER
        stopTimer();mGameOver=true;
        const t=fmtTime();
        let m='<div class="game-over" style="background:#ffebee;color:#c62828">';
        m+='<div class="go-title">Sai rồi! Dừng lại!</div>';
        m+='<div class="go-answer">'+cA+' &times; '+cB+' = <b>'+mResult+'</b></div>';
        m+='<div class="go-stats">';
        m+='Đúng: <b>'+mOk+'</b> / '+mAl+' bài<br>';
        m+='Thời gian: <b>'+t+'</b></div></div>';
        $('mDone').innerHTML=m;$('mDone').classList.remove('hidden');
        $('mSolBtn').classList.remove('hidden');
        $('mReplay').classList.remove('hidden');
    }
}

function showMSol(){
    const aStr=cA+'',bStr=cB+'',rStr=mResult+'';
    if(mType===1){
        const mx=Math.max(aStr.length,bStr.length+1,rStr.length);
        let h=mHead(mx,aStr,bStr)+'<div class="m-line"><span class="q-done">'+pad(rStr,mx)+'</span></div></div>';
        $('mBoard').innerHTML=h;
    }else{
        const pp1S=mPP1+'',pp2S=mPP2+'';
        const mx=Math.max(aStr.length,bStr.length+1,pp1S.length,pp2S.length+1,rStr.length);
        let h=mHead(mx,aStr,bStr)+'<div class="m-line"><span class="c-blue">'+pad(pp1S,mx)+'</span></div><div>';
        h+='<span class="c-blue">'+pad(pp2S,mx-1)+'</span>'+S+'</div><div class="m-line">';
        h+='<span class="q-done">'+pad(rStr,mx)+'</span></div></div>';
        $('mBoard').innerHTML=h;
    }
    $('mSolBtn').classList.add('hidden');
}

// ============ DIVISION ============
let dSteps=[],dSI=0,dPh='q',dNoErr=true,dOk=0,dAl=0;
let dFirst=true,dChecked=false,dGameOver=false;

function compSteps(a,b){
    const digs=(a+'').split('').map(Number);
    let steps=[],wn=0,started=false;
    for(let i=0;i<digs.length;i++){
        wn=wn*10+digs[i];
        if(!started&&wn<b&&i<digs.length-1)continue;
        started=true;
        const q=Math.floor(wn/b),p=q*b,r=wn-p;
        steps.push({take:wn,q:q,p:p,r:r,di:i,nd:i<digs.length-1?digs[i+1]:null});
        wn=r;
    }
    return steps;
}

function genD(){
    cB=ri(2,9);cA=Math.random()<0.5?ri(1000,9999):ri(1000,99999);
    dSteps=compSteps(cA,cB);
}

function nxtD(){
    if(dGameOver)return;
    genD();
    $('dDone').classList.add('hidden');$('dDone').className='hidden';
    $('dNxt').classList.add('hidden');$('dSolBtn').classList.add('hidden');
    $('dChk').classList.add('hidden');$('dReplay').classList.add('hidden');
    $('dBoard').classList.remove('hidden');
    $('dOk').textContent=dOk;$('dAll').textContent=dAl;

    if(dFirst){
        $('dMode').textContent='Bài mẫu - làm theo hướng dẫn';
        dSI=0;dPh='q';dNoErr=true;renGuided();
    }else{
        $('dMode').textContent='Tự trình bày phép chia';
        $('dInst').innerHTML='Điền vào các ô trống, xong bấm <b>Kiểm tra</b>';
        dChecked=false;$('dChk').classList.remove('hidden');renFree();
    }
}

function renGuided(){
    const aStr=cA+'',W=aStr.length,done=dSI>=dSteps.length;
    let qH='';
    for(let i=0;i<dSteps.length;i++){
        if(i<dSI||(i===dSI&&dPh!=='q')||done) qH+='<span class="q-done">'+dSteps[i].q+'</span>';
        else if(i===dSI&&dPh==='q') qH+='<input type="number" id="ai" class="q-inp">';
        else qH+='<span class="q-blank">_</span>';
    }
    let wH='<div class="work-row">'+aStr+'</div>';
    for(let i=0;i<dSteps.length;i++){
        const s=dSteps[i];
        if(i<dSI||done){
            if(s.nd!==null){const rb=s.r*10+s.nd,rbStr=rb<10?'0'+rb:''+rb;wH+='<div class="work-row">'+S.repeat(s.di)+rbStr+'</div>'}
            else wH+='<div class="work-row">'+S.repeat(s.di)+'<span class="c-pink">'+s.r+'</span></div>';
        }else if(i===dSI&&dPh==='r'){
            if(s.nd!==null){const rb=s.r*10+s.nd,rbStr=rb<10?'0'+rb:''+rb;wH+='<div class="work-row">'+S.repeat(s.di)+'<input type="number" id="ai" class="w-inp" style="width:'+Math.max(rbStr.length,2)*1.2+'ch"></div>'}
            else wH+='<div class="work-row">'+S.repeat(s.di)+'<input type="number" id="ai" class="w-inp" style="width:1.5ch"></div>';
        }
    }
    $('dBoard').innerHTML='<div class="div-frame"><div class="div-left" style="min-width:'+W+'ch">'+wH+'</div><div class="div-right"><div class="div-divisor">'+cB+'</div><div class="div-quotient">'+qH+'</div></div></div>';
    let inst='';
    if(!done){const s=dSteps[dSI];
        if(dPh==='q') inst=s.take+' chia '+cB+' được <strong>mấy</strong>?';
        else{inst=s.take+' &minus; ('+s.q+'&times;'+cB+') = <strong>?</strong>';if(s.nd!==null)inst+=' và hạ = <strong>?</strong>'}
    }
    $('dInst').innerHTML=inst;
    setTimeout(()=>{const inp=$('ai');if(inp)inp.focus()},50);
}

function chkGuided(){
    const inp=$('ai');if(!inp)return;
    const v=parseInt(inp.value);if(isNaN(v)||v<0){inp.focus();return}
    const s=dSteps[dSI];let exp;
    if(dPh==='q')exp=s.q;else exp=s.nd!==null?s.r*10+s.nd:s.r;
    if(v===exp){if(dPh==='q')dPh='r';else{dSI++;dPh='q';if(dSI>=dSteps.length)finGuided()}renGuided()}
    else{dNoErr=false;inp.classList.add('input-wrong');setTimeout(()=>{inp.classList.remove('input-wrong');inp.value='';inp.focus()},400)}
}

function finGuided(){
    dAl++;const q=Math.floor(cA/cB),r=cA%cB;
    if(dNoErr)dOk++;
    let m='<div class="div-done-msg">';
    m+=dNoErr?'Giỏi lắm! &#127881;<br>':'Hoàn thành! &#128170;<br>';
    m+='<span style="font-size:.8em">'+cA+' : '+cB+' = <b>'+q+'</b>';
    if(r>0)m+=' (dư <b>'+r+'</b>)';
    m+='</span><br><span style="font-size:.65em;color:#888">Thử lại: '+q+'&times;'+cB+'='+q*cB;
    if(r>0)m+='+'+r+'='+cA;m+=' &#10004;</span>';
    m+='<br><span style="font-size:.75em;color:#1565c0">Các bài sau con tự làm nhé!</span></div>';
    $('dDone').innerHTML=m;$('dDone').classList.remove('hidden');
    $('dNxt').classList.remove('hidden');$('dInst').innerHTML='';
    $('dOk').textContent=dOk;$('dAll').textContent=dAl;
    dFirst=false;renGuided();
}

function renFree(){
    const aStr=cA+'',W=aStr.length;
    let qH='';for(let i=0;i<dSteps.length;i++) qH+='<input type="number" class="q-free" id="fq'+i+'">';
    let wH='<div class="work-row">'+aStr+'</div>';
    for(let i=0;i<dSteps.length;i++){
        const s=dSteps[i];
        if(s.nd!==null){const rb=s.r*10+s.nd,rbStr=rb<10?'0'+rb:''+rb;wH+='<div class="work-row">'+S.repeat(s.di)+'<input type="number" class="w-free" id="fr'+i+'" style="width:'+Math.max(rbStr.length,2)*1.1+'ch"></div>'}
        else wH+='<div class="work-row">'+S.repeat(s.di)+'<input type="number" class="w-free" id="fr'+i+'" style="width:1.5ch"></div>';
    }
    $('dBoard').innerHTML='<div class="div-frame"><div class="div-left" style="min-width:'+W+'ch">'+wH+'</div><div class="div-right"><div class="div-divisor">'+cB+'</div><div class="div-quotient">'+qH+'</div></div></div>';
    setTimeout(()=>{const f=$('fq0');if(f)f.focus()},50);
}

function chkDFree(){
    if(dChecked)return;dChecked=true;
    let allOk=true;
    for(let i=0;i<dSteps.length;i++){
        const s=dSteps[i];
        const qi=$('fq'+i),qv=parseInt(qi.value);
        if(qv===s.q){qi.classList.add('ok')}else{qi.classList.add('err');allOk=false}
        qi.readOnly=true;
        const rri=$('fr'+i),rv=parseInt(rri.value);
        const exp=s.nd!==null?s.r*10+s.nd:s.r;
        if(rv===exp){rri.classList.add('ok')}else{rri.classList.add('err');allOk=false}
        rri.readOnly=true;
    }
    dAl++;if(allOk)dOk++;
    const q=Math.floor(cA/cB),r=cA%cB;
    $('dChk').classList.add('hidden');$('dInst').innerHTML='';
    $('dOk').textContent=dOk;$('dAll').textContent=dAl;

    if(allOk){
        let m='<div class="div-done-msg">Đúng rồi! &#127881; '+cA+' : '+cB+' = <b>'+q+'</b>';
        if(r>0)m+=' (dư <b>'+r+'</b>)';m+='</div>';
        $('dDone').innerHTML=m;$('dDone').classList.remove('hidden');
        $('dNxt').classList.remove('hidden');
    }else{
        stopTimer();dGameOver=true;
        const t=fmtTime();
        let m='<div class="game-over" style="background:#ffebee;color:#c62828">';
        m+='<div class="go-title">Sai rồi! Dừng lại!</div>';
        m+='<div class="go-answer">'+cA+' : '+cB+' = <b>'+q+'</b>';
        if(r>0)m+=' (dư <b>'+r+'</b>)';m+='</div>';
        m+='<div class="go-stats">';
        m+='Đúng: <b>'+dOk+'</b> / '+dAl+' bài<br>';
        m+='Thời gian: <b>'+t+'</b></div></div>';
        $('dDone').innerHTML=m;$('dDone').classList.remove('hidden');
        $('dSolBtn').classList.remove('hidden');
        $('dReplay').classList.remove('hidden');
    }
}

function showDSol(){
    const aStr=cA+'',W=aStr.length;
    let qH='';for(let i=0;i<dSteps.length;i++) qH+='<span class="q-done">'+dSteps[i].q+'</span>';
    let wH='<div class="work-row">'+aStr+'</div>';
    for(let i=0;i<dSteps.length;i++){
        const s=dSteps[i];
        if(s.nd!==null){const rb=s.r*10+s.nd,rbStr=rb<10?'0'+rb:''+rb;wH+='<div class="work-row">'+S.repeat(s.di)+rbStr+'</div>'}
        else wH+='<div class="work-row">'+S.repeat(s.di)+'<span class="c-pink">'+s.r+'</span></div>';
    }
    $('dBoard').innerHTML='<div class="div-frame"><div class="div-left" style="min-width:'+W+'ch">'+wH+'</div><div class="div-right"><div class="div-divisor">'+cB+'</div><div class="div-quotient">'+qH+'</div></div></div>';
    $('dSolBtn').classList.add('hidden');
}

// ============ FRACTION ============
let fOk=0,fAl=0,fGameOver=false,fChecked=false;
let fNum,fDen,fColored;

function nxtF(){
    if(fGameOver)return;
    fDen=ri(2,10);
    fNum=ri(1,fDen-1);
    // random which cells are colored (pick fNum positions)
    let pos=[];for(let i=0;i<fDen;i++)pos.push(i);
    for(let i=pos.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pos[i],pos[j]]=[pos[j],pos[i]]}
    fColored=new Set(pos.slice(0,fNum));
    fChecked=false;

    $('fDone').classList.add('hidden');$('fDone').className='hidden';
    $('fNxt').classList.add('hidden');$('fReplay').classList.add('hidden');
    $('fChk').classList.remove('hidden');
    $('fOk').textContent=fOk;$('fAll').textContent=fAl;
    $('fInst').innerHTML='Hình chữ nhật được chia thành <b>'+fDen+'</b> phần bằng nhau, đã tô màu <b>'+fNum+'</b> phần.<br>Viết phân số chỉ phần đã tô màu:';

    let h='<div class="frac-rect"><div class="frac-cells">';
    for(let i=0;i<fDen;i++) h+='<div class="frac-cell'+(fColored.has(i)?' colored':'')+'"></div>';
    h+='</div></div>';
    h+='<div class="frac-question">Đã tô màu <div class="frac-inp-wrap"><input type="number" id="fNumInp" class="frac-inp"><div class="frac-line"></div><input type="number" id="fDenInp" class="frac-inp"></div> hình chữ nhật.</div>';
    $('fBoard').innerHTML=h;
    setTimeout(()=>{const inp=$('fNumInp');if(inp)inp.focus()},50);
}

function chkFrac(){
    if(fChecked)return;fChecked=true;
    const nv=parseInt($('fNumInp').value),dv=parseInt($('fDenInp').value);
    const ok=(nv===fNum&&dv===fDen);
    fAl++;if(ok)fOk++;
    $('fChk').classList.add('hidden');
    $('fOk').textContent=fOk;$('fAll').textContent=fAl;
    $('fNumInp').readOnly=true;$('fDenInp').readOnly=true;

    if(ok){
        $('fNumInp').style.borderColor='#4caf50';$('fNumInp').style.background='#e8f5e9';
        $('fDenInp').style.borderColor='#4caf50';$('fDenInp').style.background='#e8f5e9';
        $('fDone').innerHTML='<div class="div-done-msg">Đúng rồi! &#127881; '+fNum+'/'+fDen+'</div>';
        $('fDone').classList.remove('hidden');
        $('fNxt').classList.remove('hidden');
    }else{
        $('fNumInp').style.borderColor='#f44336';$('fNumInp').style.background='#ffebee';
        $('fDenInp').style.borderColor='#f44336';$('fDenInp').style.background='#ffebee';
        stopTimer();fGameOver=true;
        const t=fmtTime();
        let m='<div class="game-over" style="background:#ffebee;color:#c62828">';
        m+='<div class="go-title">Sai rồi! Dừng lại!</div>';
        m+='<div class="go-answer">Đáp án: <b>'+fNum+'/'+fDen+'</b></div>';
        m+='<div class="go-stats">';
        m+='Đúng: <b>'+fOk+'</b> / '+fAl+' bài<br>';
        m+='Thời gian: <b>'+t+'</b></div></div>';
        $('fDone').innerHTML=m;$('fDone').classList.remove('hidden');
        $('fReplay').classList.remove('hidden');
    }
}

// ========== KEYBOARD ==========
document.addEventListener('keydown',e=>{
    if(e.key!=='Enter')return;
    if(!$('multPage').classList.contains('hidden')){
        if(mGameOver){if(!$('mReplay').classList.contains('hidden'))startEx('mult');return}
        if(mFirst){if($('ai'))chkMG();else if(!$('mNxt').classList.contains('hidden'))nxtM()}
        else{
            if(mType===1&&$('ai')&&$('ai').value!=='')advMF();
            else if(!mChecked&&!$('mChk').classList.contains('hidden'))chkMF();
            else if(!$('mNxt').classList.contains('hidden'))nxtM();
        }
    }
    if(!$('divPage').classList.contains('hidden')){
        if(dGameOver){if(!$('dReplay').classList.contains('hidden'))startEx('div');return}
        if(dFirst){if($('ai'))chkGuided();else if(!$('dNxt').classList.contains('hidden'))nxtD()}
        else{
            if(!dChecked&&!$('dChk').classList.contains('hidden'))chkDFree();
            else if(!$('dNxt').classList.contains('hidden'))nxtD();
        }
    }
    if(!$('fracPage').classList.contains('hidden')){
        if(fGameOver){if(!$('fReplay').classList.contains('hidden'))startEx('frac');return}
        if(!fChecked&&!$('fChk').classList.contains('hidden'))chkFrac();
        else if(!$('fNxt').classList.contains('hidden'))nxtF();
    }
});
</script>
