<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai Tap Toan Lop 3 - Nhan Chia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header h1 { font-size: 2em; margin-bottom: 4px; }
        header p { font-size: 1em; opacity: 0.9; }
        .card {
            background: white; border-radius: 18px; padding: 24px;
            margin-bottom: 16px; box-shadow: 0 6px 25px rgba(0,0,0,0.15);
        }
        .card h2 { color: #e91e63; margin-bottom: 16px; font-size: 1.3em; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-btn {
            padding: 18px 12px; border: 3px solid #e91e63; border-radius: 14px;
            background: white; cursor: pointer; font-size: 1em; font-weight: 600;
            color: #333; transition: all 0.2s; text-align: center;
        }
        .menu-btn:hover { background: #e91e63; color: white; transform: translateY(-2px); }
        .menu-btn .icon { font-size: 2em; display: block; margin-bottom: 6px; }
        .menu-btn .desc { font-size: 0.78em; color: #888; font-weight: 400; margin-top: 4px; }
        .menu-btn:hover .desc { color: #ffcdd2; }
        .semester-title { text-align: center; font-weight: 700; color: #e91e63; margin: 14px 0 10px; font-size: 1.05em; }
        .exercise-header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
        }
        .exercise-header h2 { margin-bottom: 0; text-align: left; }
        .score-box {
            background: #fff3e0; border-radius: 10px; padding: 8px 14px;
            font-weight: 600; color: #e65100; font-size: 0.95em;
        }
        .problem-display {
            background: #fafafa; border: 2px solid #e0e0e0; border-radius: 14px;
            padding: 20px; margin-bottom: 16px;
            font-family: 'Courier New', Courier, monospace; font-size: 1.5em;
            line-height: 1.6; overflow-x: auto;
        }
        .mult-layout { display: inline-block; text-align: right; }
        .mult-row { text-align: right; min-height: 1.5em; }
        .mult-sign { margin-right: 4px; }
        .mult-line { border-top: 3px solid #333; margin: 4px 0; }
        .mult-partial { color: #1565c0; }
        .mult-result { font-weight: bold; color: #e91e63; }
        .answer-section { margin: 16px 0; text-align: center; }
        .answer-section label { font-weight: 600; font-size: 1.1em; color: #333; display: block; margin-bottom: 8px; }
        .answer-input {
            font-size: 1.5em; padding: 10px 16px; border: 3px solid #e0e0e0;
            border-radius: 12px; width: 200px; text-align: center;
            font-family: 'Courier New', monospace; font-weight: bold;
        }
        .answer-input:focus { outline: none; border-color: #e91e63; }
        .answer-input.correct { border-color: #4caf50; background: #e8f5e9; }
        .answer-input.wrong { border-color: #f44336; background: #ffebee; }
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
        .btn {
            padding: 12px 24px; border: none; border-radius: 12px;
            font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #e91e63; color: white; }
        .btn-primary:hover { background: #c2185b; }
        .btn-green { background: #4caf50; color: white; }
        .btn-green:hover { background: #388e3c; }
        .btn-blue { background: #2196f3; color: white; }
        .btn-blue:hover { background: #1565c0; }
        .btn-back { background: #9e9e9e; color: white; }
        .btn-back:hover { background: #616161; }
        .solution-box {
            background: #f3e5f5; border: 2px solid #ce93d8; border-radius: 14px;
            padding: 20px; margin-top: 16px; display: none;
        }
        .solution-box.show { display: block; }
        .solution-box h3 { color: #7b1fa2; margin-bottom: 12px; text-align: center; }
        .solution-steps { font-family: 'Courier New', monospace; font-size: 1.15em; line-height: 1.7; overflow-x: auto; }
        .step-explain {
            font-family: 'Segoe UI', sans-serif; font-size: 0.75em; color: #7b1fa2;
            margin: 2px 0 8px; padding-left: 8px; border-left: 3px solid #ce93d8;
        }
        .result-msg {
            text-align: center; font-size: 1.3em; font-weight: 700;
            padding: 12px; border-radius: 12px; margin: 12px 0;
        }
        .result-msg.correct { background: #e8f5e9; color: #2e7d32; }
        .result-msg.wrong { background: #ffebee; color: #c62828; }
        .hidden { display: none !important; }

        /* ===== INTERACTIVE DIVISION ===== */
        .div-workspace {
            font-family: 'Courier New', monospace;
            font-size: 1.4em;
            padding: 16px;
            background: #fffde7;
            border: 2px solid #ffd54f;
            border-radius: 14px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        .div-frame {
            display: inline-block;
            min-width: 280px;
        }
        .div-top {
            display: flex;
            align-items: flex-start;
        }
        .div-dividend {
            padding-right: 12px;
            letter-spacing: 4px;
            font-weight: bold;
        }
        .div-separator {
            border-left: 3px solid #333;
            padding-left: 12px;
        }
        .div-divisor {
            padding-bottom: 6px;
            border-bottom: 3px solid #333;
            font-weight: bold;
            min-width: 60px;
        }
        .div-quotient {
            padding-top: 6px;
            min-height: 1.4em;
            letter-spacing: 4px;
            color: #e91e63;
            font-weight: bold;
        }
        .div-work-area {
            margin-top: 10px;
            padding-left: 0;
        }
        .div-work-row {
            display: flex;
            align-items: center;
            min-height: 1.8em;
        }
        .div-work-num {
            min-width: 80px;
            text-align: right;
            padding-right: 16px;
        }
        .div-work-line {
            border-bottom: 2px solid #333;
            min-width: 60px;
            margin: 2px 0;
            display: inline-block;
        }
        .div-completed-num { color: #333; }
        .div-completed-sub { color: #1565c0; }
        .div-remainder-final { color: #e91e63; font-weight: bold; }

        /* Step input area */
        .step-panel {
            background: #e3f2fd;
            border: 2px solid #90caf9;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .step-panel h3 {
            color: #1565c0;
            margin-bottom: 12px;
            font-size: 1.05em;
        }
        .step-question {
            font-size: 1.15em;
            margin: 10px 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .step-input {
            width: 80px;
            font-size: 1.2em;
            padding: 6px 10px;
            border: 3px solid #90caf9;
            border-radius: 10px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .step-input:focus { outline: none; border-color: #1565c0; }
        .step-input.correct { border-color: #4caf50; background: #e8f5e9; }
        .step-input.wrong { border-color: #f44336; background: #ffebee; animation: shake 0.3s; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .step-ok { color: #4caf50; font-weight: bold; font-size: 1.2em; }
        .step-hint {
            font-size: 0.85em; color: #f57c00; margin-top: 4px;
            display: none; font-style: italic;
        }
        .step-hint.show { display: block; }

        .div-done-msg {
            text-align: center; font-size: 1.4em; font-weight: 700;
            color: #2e7d32; background: #e8f5e9; padding: 16px;
            border-radius: 12px; margin: 12px 0;
        }

        @media (max-width: 500px) {
            .menu-grid { grid-template-columns: 1fr; }
            .problem-display { font-size: 1.2em; padding: 14px; }
            .div-workspace { font-size: 1.1em; }
            header h1 { font-size: 1.5em; }
            .answer-input { width: 160px; font-size: 1.3em; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Bai Tap Toan Lop 3</h1>
        <p>Luyen tap phep nhan va phep chia</p>
    </header>

    <!-- MENU -->
    <div id="menuPage" class="card">
        <h2>Chon bai tap</h2>
        <div class="semester-title">Hoc ky 1</div>
        <div class="menu-grid">
            <button class="menu-btn" onclick="startExercise('mult','hk1')">
                <span class="icon">&#10006;</span>Phep nhan
                <span class="desc">3-4 chu so &times; 1 chu so</span>
            </button>
            <button class="menu-btn" onclick="startExercise('div','hk1')">
                <span class="icon">&#247;</span>Phep chia
                <span class="desc">4 chu so &divide; 1 chu so</span>
            </button>
        </div>
        <div class="semester-title" style="margin-top:20px">Hoc ky 2</div>
        <div class="menu-grid">
            <button class="menu-btn" onclick="startExercise('mult','hk2')">
                <span class="icon">&#10006;</span>Phep nhan
                <span class="desc">4-5 chu so &times; 1-2 chu so</span>
            </button>
            <button class="menu-btn" onclick="startExercise('div','hk2')">
                <span class="icon">&#247;</span>Phep chia
                <span class="desc">4-5 chu so &divide; 1 chu so</span>
            </button>
        </div>
    </div>

    <!-- MULTIPLICATION EXERCISE -->
    <div id="multPage" class="card hidden">
        <div class="exercise-header">
            <h2 id="multTitle"></h2>
            <div class="score-box">Dung: <span id="multCorrect">0</span> / <span id="multTotal">0</span></div>
        </div>
        <div class="problem-display" id="multDisplay"></div>
        <div class="answer-section">
            <label>Ket qua:</label>
            <input type="number" class="answer-input" id="multAnswer" placeholder="?">
        </div>
        <div id="multResult" class="result-msg hidden"></div>
        <div class="btn-row">
            <button class="btn btn-green" id="multBtnCheck" onclick="checkMult()">Kiem tra</button>
            <button class="btn btn-blue hidden" id="multBtnSol" onclick="toggleMultSol()">Xem cach lam</button>
            <button class="btn btn-primary hidden" id="multBtnNext" onclick="nextMult()">Bai tiep theo</button>
        </div>
        <div class="solution-box" id="multSolBox">
            <h3>Cach trinh bay</h3>
            <div class="solution-steps" id="multSolSteps"></div>
        </div>
        <div class="btn-row"><button class="btn btn-back" onclick="goMenu()">Quay lai menu</button></div>
    </div>

    <!-- DIVISION EXERCISE (interactive step-by-step) -->
    <div id="divPage" class="card hidden">
        <div class="exercise-header">
            <h2 id="divTitle"></h2>
            <div class="score-box">Dung: <span id="divCorrect">0</span> / <span id="divTotal">0</span></div>
        </div>

        <!-- Visual division layout -->
        <div class="div-workspace" id="divWorkspace"></div>

        <!-- Step-by-step input panel -->
        <div id="stepPanel" class="step-panel"></div>

        <!-- Done message -->
        <div id="divDone" class="div-done-msg hidden"></div>

        <div class="btn-row">
            <button class="btn btn-primary hidden" id="divBtnNext" onclick="nextDiv()">Bai tiep theo</button>
        </div>
        <div class="btn-row"><button class="btn btn-back" onclick="goMenu()">Quay lai menu</button></div>
    </div>
</div>

<script>
// ===== SHARED STATE =====
let currentType, currentSemester;
let currentA, currentB;

// ===== MULT STATE =====
let multAnswer, multAnswered;
let multScoreOk = 0, multScoreAll = 0;

// ===== DIV STATE =====
let divSteps = [];       // computed steps
let divStepIndex = 0;    // which step we're on
let divSubStep = 0;      // 0=quotient digit, 1=product, 2=remainder
let divQuotientSoFar = '';
let divWorkRows = [];    // completed rows for the visual
let divNoMistake = true; // track if any mistake in this problem
let divScoreOk = 0, divScoreAll = 0;

function goMenu() {
    document.getElementById('menuPage').classList.remove('hidden');
    document.getElementById('multPage').classList.add('hidden');
    document.getElementById('divPage').classList.add('hidden');
}

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pad(s, n) { return s.padStart(n, '\u00A0'); }

// ===== START =====
function startExercise(type, semester) {
    currentType = type;
    currentSemester = semester;
    if (type === 'mult') {
        multScoreOk = 0; multScoreAll = 0;
        let t = 'Phep nhan' + (semester === 'hk1' ? ' - Hoc ky 1' : ' - Hoc ky 2');
        document.getElementById('multTitle').textContent = t;
        document.getElementById('menuPage').classList.add('hidden');
        document.getElementById('multPage').classList.remove('hidden');
        nextMult();
    } else {
        divScoreOk = 0; divScoreAll = 0;
        let t = 'Phep chia' + (semester === 'hk1' ? ' - Hoc ky 1' : ' - Hoc ky 2');
        document.getElementById('divTitle').textContent = t;
        document.getElementById('menuPage').classList.add('hidden');
        document.getElementById('divPage').classList.remove('hidden');
        nextDiv();
    }
}

// ============================================================
//  MULTIPLICATION (keep simple: input answer + show solution)
// ============================================================
function genMult() {
    if (currentSemester === 'hk1') {
        currentA = randInt(100, 9999);
        currentB = randInt(2, 9);
    } else {
        currentA = randInt(1000, 99999);
        currentB = Math.random() < 0.6 ? randInt(2, 9) : randInt(11, 99);
    }
    multAnswer = currentA * currentB;
}

function renderMult(a, b, show) {
    const aS = a.toString(), bS = b.toString(), rS = (a*b).toString();
    const mx = Math.max(aS.length, bS.length+1, rS.length);
    let h = '<div class="mult-layout">';
    h += `<div class="mult-row">${pad(aS,mx)}</div>`;
    h += `<div class="mult-row"><span class="mult-sign">&times;</span>${pad(bS,mx-1)}</div>`;
    h += `<div class="mult-line" style="width:${mx*0.65+1}em"></div>`;
    if (show) {
        if (bS.length===1) {
            h += `<div class="mult-row mult-result">${pad(rS,mx)}</div>`;
        } else {
            const p1=a*parseInt(bS[1]), p2=a*parseInt(bS[0]);
            const dl = Math.max(mx, p2.toString().length+1);
            h += `<div class="mult-row mult-partial">${pad(p1.toString(),dl)}</div>`;
            h += `<div class="mult-row mult-partial">${pad(p2.toString(),dl-1)}</div>`;
            h += `<div class="mult-line" style="width:${dl*0.65+1}em"></div>`;
            h += `<div class="mult-row mult-result">${pad(rS,dl)}</div>`;
        }
    } else {
        h += `<div class="mult-row" style="color:#ccc">${pad('?',mx)}</div>`;
    }
    h += '</div>';
    return h;
}

function nextMult() {
    multAnswered = false;
    genMult();
    document.getElementById('multDisplay').innerHTML = renderMult(currentA, currentB, false);
    document.getElementById('multAnswer').value = '';
    document.getElementById('multAnswer').className = 'answer-input';
    document.getElementById('multResult').classList.add('hidden');
    document.getElementById('multSolBox').classList.remove('show');
    document.getElementById('multBtnCheck').classList.remove('hidden');
    document.getElementById('multBtnSol').classList.add('hidden');
    document.getElementById('multBtnNext').classList.add('hidden');
    document.getElementById('multCorrect').textContent = multScoreOk;
    document.getElementById('multTotal').textContent = multScoreAll;
    document.getElementById('multAnswer').focus();
}

function checkMult() {
    if (multAnswered) return;
    const v = parseInt(document.getElementById('multAnswer').value);
    if (isNaN(v)) return;
    multAnswered = true;
    multScoreAll++;
    const ok = v === multAnswer;
    if (ok) multScoreOk++;
    const inp = document.getElementById('multAnswer');
    const msg = document.getElementById('multResult');
    inp.className = 'answer-input ' + (ok ? 'correct' : 'wrong');
    msg.className = 'result-msg ' + (ok ? 'correct' : 'wrong');
    msg.innerHTML = ok ? 'Dung roi! &#127881;' : `Chua dung. Dap an: <strong>${multAnswer}</strong>`;
    msg.classList.remove('hidden');
    document.getElementById('multBtnCheck').classList.add('hidden');
    document.getElementById('multBtnSol').classList.remove('hidden');
    document.getElementById('multBtnNext').classList.remove('hidden');
    document.getElementById('multCorrect').textContent = multScoreOk;
    document.getElementById('multTotal').textContent = multScoreAll;
}

function toggleMultSol() {
    const box = document.getElementById('multSolBox');
    if (box.classList.contains('show')) { box.classList.remove('show'); return; }
    document.getElementById('multSolSteps').innerHTML = renderMultSol(currentA, currentB);
    box.classList.add('show');
}

function renderMultSol(a, b) {
    const aS=a.toString(), bS=b.toString(), r=a*b;
    let h = renderMult(a,b,true) + '<br>';
    h += '<div style="font-family:Segoe UI,sans-serif;font-size:0.75em;color:#555;line-height:2">';
    if (bS.length===1) {
        const bd=parseInt(bS), ds=aS.split('').map(Number).reverse();
        let carry=0;
        for(let i=0;i<ds.length;i++){
            const p=ds[i]*bd+carry, w=p%10, nc=Math.floor(p/10);
            h+=`<div class="step-explain"><strong>Buoc ${i+1}:</strong> ${bd} &times; ${ds[i]}`;
            if(carry>0) h+=` + ${carry} (nho)`;
            h+=` = ${p}, viet <strong>${w}</strong>`;
            if(nc>0) h+=`, nho <strong>${nc}</strong>`;
            h+=`</div>`;
            carry=nc;
        }
        if(carry>0) h+=`<div class="step-explain">Viet <strong>${carry}</strong> (nho con lai)</div>`;
    } else {
        const b1=parseInt(bS[1]),b0=parseInt(bS[0]),p1=a*b1,p2=a*b0;
        h+=`<div class="step-explain"><strong>Buoc 1:</strong> ${aS} &times; ${b1} = <strong>${p1}</strong></div>`;
        h+=`<div class="step-explain"><strong>Buoc 2:</strong> ${aS} &times; ${b0} = <strong>${p2}</strong> (lech trai)</div>`;
        h+=`<div class="step-explain"><strong>Buoc 3:</strong> ${p1} + ${p2}0 = <strong>${r}</strong></div>`;
    }
    h+=`<div style="background:#e8f5e9;padding:10px;border-radius:8px;text-align:center;font-size:1.1em;margin-top:8px"><strong>${aS} &times; ${bS} = ${r}</strong></div>`;
    h+='</div>';
    return h;
}

// ============================================================
//  DIVISION - INTERACTIVE STEP BY STEP
// ============================================================
function genDiv() {
    if (currentSemester === 'hk1') {
        currentB = randInt(2, 9);
        currentA = randInt(1000, 9999);
    } else {
        currentB = randInt(2, 9);
        currentA = randInt(1000, 99999);
    }
}

function computeDivSteps(a, b) {
    const digits = a.toString().split('').map(Number);
    let steps = [];
    let workingNum = 0;
    let started = false;

    for (let i = 0; i < digits.length; i++) {
        workingNum = workingNum * 10 + digits[i];

        if (!started && workingNum < b && i < digits.length - 1) {
            continue; // first group not enough, take more
        }

        started = true;
        const qDigit = Math.floor(workingNum / b);
        const product = qDigit * b;
        const remainder = workingNum - product;

        steps.push({
            takeNum: workingNum,
            qDigit: qDigit,
            product: product,
            remainder: remainder,
            digitIndex: i,
            nextDigit: (i < digits.length - 1) ? digits[i + 1] : null
        });

        workingNum = remainder;
    }
    return steps;
}

function nextDiv() {
    genDiv();
    divSteps = computeDivSteps(currentA, currentB);
    divStepIndex = 0;
    divSubStep = 0;
    divQuotientSoFar = '';
    divWorkRows = [];
    divNoMistake = true;

    document.getElementById('divDone').classList.add('hidden');
    document.getElementById('divBtnNext').classList.add('hidden');
    document.getElementById('divCorrect').textContent = divScoreOk;
    document.getElementById('divTotal').textContent = divScoreAll;

    renderDivWorkspace();
    renderStepPanel();
}

function renderDivWorkspace() {
    const aStr = currentA.toString();
    const bStr = currentB.toString();

    let qDisplay = divQuotientSoFar;
    // Pad quotient placeholder
    const totalQDigits = divSteps.length;
    while (qDisplay.length < totalQDigits) qDisplay += '_';

    let html = '<div class="div-frame">';

    // Top: dividend | divisor / quotient
    html += '<div class="div-top">';
    html += `<div class="div-dividend">${aStr}</div>`;
    html += '<div class="div-separator">';
    html += `<div class="div-divisor">${bStr}</div>`;
    html += `<div class="div-quotient">${qDisplay}</div>`;
    html += '</div></div>';

    // Work rows (completed steps)
    if (divWorkRows.length > 0) {
        html += '<div class="div-work-area">';
        for (const row of divWorkRows) {
            html += row;
        }
        html += '</div>';
    }

    html += '</div>';
    document.getElementById('divWorkspace').innerHTML = html;
}

function getIndent(num, aLen) {
    // Right-align numbers relative to dividend width
    const numStr = num.toString();
    const spaces = aLen - numStr.length;
    return '\u00A0'.repeat(Math.max(0, spaces * 2));
}

function renderStepPanel() {
    const panel = document.getElementById('stepPanel');
    if (divStepIndex >= divSteps.length) {
        // All steps done!
        panel.innerHTML = '';
        finishDiv();
        return;
    }

    const step = divSteps[divStepIndex];
    const stepNum = divStepIndex + 1;
    const b = currentB;
    let html = `<h3>Buoc ${stepNum} / ${divSteps.length}</h3>`;

    if (divSubStep === 0) {
        // Ask: takeNum ÷ b = ?
        html += `<div class="step-question">`;
        html += `<strong>${step.takeNum}</strong> chia <strong>${b}</strong> duoc`;
        html += ` <input type="number" class="step-input" id="stepInput" placeholder="?">`;
        html += `</div>`;
        html += `<div class="step-hint" id="stepHint">Goi y: ${step.takeNum} &divide; ${b} = ?</div>`;
        html += `<div class="btn-row"><button class="btn btn-green" onclick="checkDivStep()">Kiem tra</button>`;
        html += `<button class="btn btn-back" onclick="showHint()" style="font-size:0.85em">Goi y</button></div>`;
    } else if (divSubStep === 1) {
        // Ask: qDigit × b = ?
        html += `<div class="step-question">`;
        html += `<strong>${step.qDigit}</strong> nhan <strong>${b}</strong> bang`;
        html += ` <input type="number" class="step-input" id="stepInput" placeholder="?">`;
        html += `</div>`;
        html += `<div class="step-hint" id="stepHint">Goi y: ${step.qDigit} &times; ${b} = ?</div>`;
        html += `<div class="btn-row"><button class="btn btn-green" onclick="checkDivStep()">Kiem tra</button>`;
        html += `<button class="btn btn-back" onclick="showHint()" style="font-size:0.85em">Goi y</button></div>`;
    } else if (divSubStep === 2) {
        // Ask: takeNum - product = ?
        html += `<div class="step-question">`;
        html += `<strong>${step.takeNum}</strong> tru <strong>${step.product}</strong> bang`;
        html += ` <input type="number" class="step-input" id="stepInput" placeholder="?">`;
        html += `</div>`;
        html += `<div class="step-hint" id="stepHint">Goi y: ${step.takeNum} - ${step.product} = ?</div>`;
        html += `<div class="btn-row"><button class="btn btn-green" onclick="checkDivStep()">Kiem tra</button>`;
        html += `<button class="btn btn-back" onclick="showHint()" style="font-size:0.85em">Goi y</button></div>`;
    }

    panel.innerHTML = html;
    setTimeout(() => {
        const inp = document.getElementById('stepInput');
        if (inp) inp.focus();
    }, 50);
}

function showHint() {
    const h = document.getElementById('stepHint');
    if (h) h.classList.add('show');
}

function checkDivStep() {
    const inp = document.getElementById('stepInput');
    if (!inp) return;
    const val = parseInt(inp.value);
    if (isNaN(val)) { inp.focus(); return; }

    const step = divSteps[divStepIndex];
    let expected;

    if (divSubStep === 0) expected = step.qDigit;
    else if (divSubStep === 1) expected = step.product;
    else expected = step.remainder;

    if (val === expected) {
        inp.className = 'step-input correct';
        setTimeout(() => advanceDivStep(), 400);
    } else {
        inp.className = 'step-input wrong';
        divNoMistake = false;
        // Show hint after wrong answer
        showHint();
        setTimeout(() => {
            inp.className = 'step-input';
            inp.value = '';
            inp.focus();
        }, 600);
    }
}

function advanceDivStep() {
    const step = divSteps[divStepIndex];
    const aLen = currentA.toString().length;

    if (divSubStep === 0) {
        // Quotient digit confirmed - add to quotient display
        divQuotientSoFar += step.qDigit.toString();
        renderDivWorkspace();
        divSubStep = 1;
        renderStepPanel();
    } else if (divSubStep === 1) {
        // Product confirmed - add product row to work area
        const pStr = step.product.toString();
        const tStr = step.takeNum.toString();
        // Align product under takeNum
        const indent = '\u00A0'.repeat(Math.max(0, (tStr.length - pStr.length)) * 1);
        let row = `<div class="div-work-row"><div class="div-work-num div-completed-sub">${indent}${pStr}</div></div>`;
        row += `<div class="div-work-row"><div class="div-work-num"><span class="div-work-line" style="width:${Math.max(tStr.length, pStr.length) * 0.7}em">&nbsp;</span></div></div>`;
        divWorkRows.push(row);
        renderDivWorkspace();
        divSubStep = 2;
        renderStepPanel();
    } else {
        // Remainder confirmed - add remainder row, prepare next step
        const rStr = step.remainder.toString();
        let displayStr = rStr;

        if (step.nextDigit !== null) {
            // Show remainder with next digit brought down
            displayStr = (step.remainder === 0 ? '' : rStr) + '<strong style="color:#e91e63">' + step.nextDigit + '</strong>';
            if (step.remainder === 0) displayStr = '<strong style="color:#e91e63">' + step.nextDigit + '</strong>';
            // Actually show the full next working number
            const nextNum = step.remainder * 10 + step.nextDigit;
            displayStr = nextNum.toString().slice(0, -1) + '<strong style="color:#e91e63">' + step.nextDigit + '</strong>';
            if (nextNum < 10) displayStr = '<strong style="color:#e91e63">' + step.nextDigit + '</strong>';
        }

        let row = `<div class="div-work-row"><div class="div-work-num div-completed-num">${displayStr}</div></div>`;
        divWorkRows.push(row);
        renderDivWorkspace();

        // Move to next step
        divStepIndex++;
        divSubStep = 0;
        renderStepPanel();
    }
}

function finishDiv() {
    divScoreAll++;
    const quotient = Math.floor(currentA / currentB);
    const remainder = currentA % currentB;
    let msg = '';

    if (divNoMistake) {
        divScoreOk++;
        msg = `Gioi lam! Khong sai buoc nao! &#127881;<br>`;
    } else {
        msg = `Hoan thanh! Lan sau co gang hon nhe! &#128170;<br>`;
    }

    msg += `<span style="font-size:0.8em">${currentA} : ${currentB} = <strong>${quotient}</strong>`;
    if (remainder > 0) msg += ` (du <strong>${remainder}</strong>)`;
    msg += `</span>`;

    // Verification
    msg += `<br><span style="font-size:0.65em;color:#888">Thu lai: ${quotient} &times; ${currentB} = ${quotient * currentB}`;
    if (remainder > 0) msg += ` + ${remainder} = ${currentA}`;
    msg += ` &#10004;</span>`;

    document.getElementById('divDone').innerHTML = msg;
    document.getElementById('divDone').classList.remove('hidden');
    document.getElementById('divBtnNext').classList.remove('hidden');
    document.getElementById('divCorrect').textContent = divScoreOk;
    document.getElementById('divTotal').textContent = divScoreAll;

    // Add final remainder to workspace if > 0
    if (remainder > 0) {
        // Already shown in last step
    }
}

// Enter key handler
document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    // Check which page is visible
    if (!document.getElementById('multPage').classList.contains('hidden')) {
        if (!multAnswered) checkMult();
        else nextMult();
    }
    if (!document.getElementById('divPage').classList.contains('hidden')) {
        const inp = document.getElementById('stepInput');
        if (inp) {
            checkDivStep();
        } else {
            // Done state - go next
            if (!document.getElementById('divBtnNext').classList.contains('hidden')) nextDiv();
        }
    }
});
</script>
